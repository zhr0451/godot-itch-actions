name: Deploy to Docker Hub

on:
  push:
    branches:
      - main
    tags:
      - "godot-*"

env:
  IMAGE_NAME: zhr0451/godot-itch-actions

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout
        uses: actions/checkout@v6
      -
        name: Extract Godot version
        id: version
        if: startsWith(github.ref, 'refs/tags/godot-')
        run: |
          VERSION="${GITHUB_REF_NAME#godot-}"
          echo "godot_version=${VERSION}" >> "$GITHUB_OUTPUT"
      -
        name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      -
        name: Set up QEMU
        uses: docker/setup-qemu-action@v4
      -
        name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4
      -
        name: Build and push latest from main
        if: github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ env.IMAGE_NAME }}:latest
      -
        name: Build and push tagged Godot image
        if: startsWith(github.ref, 'refs/tags/godot-')
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            GODOT_VERSION=${{ steps.version.outputs.godot_version }}
          tags: |
            ${{ env.IMAGE_NAME }}:godot-${{ steps.version.outputs.godot_version }}
